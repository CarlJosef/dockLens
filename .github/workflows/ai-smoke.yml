name: AI Smoke (Ollama)

on:
  workflow_dispatch:

jobs:
  ollama-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and start stack (LLM override)
        run: docker compose -f docker-compose.yml -f docker-compose.llm.yml up -d --build

      - name: Wait for API
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:8000/healthz >/dev/null; then
              echo "API up"
              exit 0
            fi
            sleep 2
          done
          docker compose logs api
          exit 1

      - name: Smoke test analyze (expects LLM provider)
        run: |
          curl -fsS -X POST "http://localhost:8000/v1/analyze" \
            -H "Content-Type: application/json" \
            -d '{"text":"test","mode":"general"}' | tee /tmp/analyze.json
          grep -E -q '"provider"\s*:\s*"llm:ollama"' /tmp/analyze.json

      - name: Logs on failure
        if: failure()
        run: docker compose logs

      - name: Shutdown
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.llm.yml down --volumes
