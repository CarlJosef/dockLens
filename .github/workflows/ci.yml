name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  compose-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and start stack
        run: docker compose up -d --build

      - name: Wait for API
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:8000/docs >/dev/null; then
              echo "API up"
              exit 0
            fi
            sleep 2
          done
          docker compose logs api
          exit 1

      - name: Smoke test analyze
        run: |
          curl -fsS -X POST "http://localhost:8000/v1/analyze" \
            -H "Content-Type: application/json" \
            -d '{"text":"test","mode":"general"}' | tee /tmp/analyze.json
          grep -q '"provider"' /tmp/analyze.json

      - name: Wait for Web
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:5174/ >/dev/null; then
              echo "Web up"
              exit 0
            fi
            sleep 2
          done
          docker compose logs web
          exit 1

      - name: Logs on failure
        if: failure()
        run: docker compose logs

      - name: Shutdown
        if: always()
        run: docker compose down --volumes
